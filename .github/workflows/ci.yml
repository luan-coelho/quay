name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # Incremental compilation in CI is almost always a cache miss and only wastes
  # IO. The per-crate incremental metadata also inflates the cached `target/`.
  CARGO_INCREMENTAL: 0

jobs:
  check:
    name: ${{ matrix.os }} / cargo ${{ matrix.action }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        action: [check, test, clippy]
        exclude:
          # Git shell-out tests rely on POSIX filesystem semantics that
          # differ on macOS (case-insensitive HFS+) and Windows (path
          # separators, locking). Compilation is already verified by the
          # check + clippy jobs on all three platforms.
          - os: windows-latest
            action: test
          - os: macos-latest
            action: test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux system dependencies for Slint (Skia) + git2
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-xcb-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libssl-dev \
            pkg-config \
            mold

      # Slint's renderer-skia feature needs a C++ toolchain to build skia-safe.
      # ubuntu-latest, macos-latest and windows-latest all ship with a working
      # C++ toolchain out of the box (gcc, clang, MSVC 2022 respectively), so
      # no extra install step is needed — we only document the dependency here.

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.action }}
          cache-on-failure: true

      - name: cargo check
        if: matrix.action == 'check'
        run: cargo check --all-targets

      - name: cargo test
        if: matrix.action == 'test'
        run: cargo test --all-targets

      - name: cargo clippy
        if: matrix.action == 'clippy'
        run: cargo clippy --all-targets -- -D warnings

  # A release-build job that only runs on Linux to keep CI cheap. Its point is
  # to exercise the release profile + link step (which caught issues that debug
  # builds miss in the past, e.g. LTO failures with libgit2-sys).
  release-build-linux:
    name: release build (ubuntu)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev libxkbcommon-dev libwayland-dev \
            libx11-xcb-dev libxcb-randr0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libssl-dev pkg-config mold
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release
          cache-on-failure: true
      - name: cargo build --release
        run: cargo build --release
      - name: Upload binary artefact
        uses: actions/upload-artifact@v4
        with:
          name: quay-linux-x86_64
          path: target/release/quay
          if-no-files-found: error
